services:
  server:
    build: .
    restart: always
    ports:
      - 8000:8000
    environment:
      - PORT=8000
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      consul:
        condition: service_healthy

  consul:
    image: hashicorp/consul:1.21
    ports:
      - 8500:8500
      - 8600:8600/tcp
      - 8600:8600/udp
    command: "agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0"
    volumes:
      - consul_store:/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  consul_store:
