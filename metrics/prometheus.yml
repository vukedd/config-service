# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Configuration service metrics
  - job_name: "config-service"
    static_configs:
      - targets: ["host.docker.internal:8000"] # Windows/Mac Docker Desktop
        # - targets: ['172.17.0.1:8000']        # Linux Docker
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: false

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
