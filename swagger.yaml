                "500":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
            summary: Get configuration group by ID as DTO
            tags:
                - configurationGroups
    /configurationGroups/dto/{name}/{version}:
        get:
            description: This endpoint retrieves a specific configuration group by its name and version and returns it as a DTO.
            operationId: getConfigurationGroupByNameAndVersionToDto
            parameters:
                - description: The name of the configuration group
                  in: path
                  name: name
                  required: true
