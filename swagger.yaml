                    description: NoContentResponse
                    schema:
                        $ref: '#/definitions/NoContentResponse'
                "404":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
            summary: Delete configuration group by ID
            tags:
                - configurationGroups
        get:
            description: This endpoint retrieves a specific configuration group by its ID.
            operationId: getConfigurationGroupById
            parameters:
                - description: The ID of the configuration group
                  in: path
                  name: id
                  required: true
                  type: string
            responses:
