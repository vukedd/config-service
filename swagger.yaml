        get:
            description: This endpoint retrieves a specific configuration group by its name and version.
            operationId: getConfigurationGroupByNameAndVersion
            parameters:
                - description: The name of the configuration group
                  in: path
                  name: name
                  required: true
                  type: string
                - description: The version of the configuration group
                  in: path
                  name: version
                  required: true
