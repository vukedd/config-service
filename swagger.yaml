                    schema:
                        $ref: '#/definitions/ErrorResponse'
            summary: Get all configurations
            tags:
                - configurations
        post:
            description: This endpoint creates a new configuration with the provided data.
            operationId: createConfiguration
            parameters:
                - description: Configuration data to create
                  in: body
                  name: body
                  required: true
                  schema:
                    $ref: '#/definitions/CreateConfigurationDto'
                  x-go-name: Body
            responses:
