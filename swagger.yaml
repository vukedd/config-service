                "404":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
                "500":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
            summary: Get configuration group by ID
            tags:
                - configurationGroups
        put:
            description: This endpoint updates an existing configuration group with the provided data.
            operationId: updateConfigurationGroup
            parameters:
                - description: The ID of the configuration group
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
                - description: Configuration group data to update
                  in: body
                  name: body
                  required: true
                  schema:
                    $ref: '#/definitions/ConfigurationGroupDto'
                  x-go-name: Body
            responses:
                "200":
                    description: ConfigurationGroup
                    schema:
                        $ref: '#/definitions/ConfigurationGroup'
                "400":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
                "404":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
                "500":
                    description: ErrorResponse
                    schema:
                        $ref: '#/definitions/ErrorResponse'
            summary: Update configuration group by ID
            tags:
                - configurationGroups
    /configurationGroups/{name}/{version}:
        delete:
            description: This endpoint deletes a specific configuration group by its name and version.
            operationId: deleteConfigurationGroupByNameAndVersion
            parameters:
                - description: The name of the configuration group
