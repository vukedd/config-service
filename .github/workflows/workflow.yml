name: Go CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Start Consul via Docker Compose
        run: |
          docker compose up -d consul
          echo "Waiting for Consul to be healthy..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' $(docker-compose ps -q consul))" == "healthy" ]; do
            sleep 2
          done

      - name: Run unit tests
        env:
          CONSUL_ADDRESS: "localhost:8500"
        run: go test -v ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ format('{0}/{1}:{2}', secrets.DOCKERHUB_USERNAME, github.event.repository.name, github.sha) }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}:latest', secrets.DOCKERHUB_USERNAME, github.event.repository.name) || '' }}
            ${{ github.ref == 'refs/heads/develop' && format('{0}/{1}:develop', secrets.DOCKERHUB_USERNAME, github.event.repository.name) || '' }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:cache,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
